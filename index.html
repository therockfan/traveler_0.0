<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Mario Style Web Game</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>

body{
margin:0;
padding:0;
background:black;
overflow:hidden;
touch-action:none;
user-select:none;
-webkit-user-select:none;
}

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:30px;
pointer-events:auto;
}

.controlBtn{
width:80px;
height:80px;
background:rgba(255,255,255,0.25);
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
touch-action:none;
}

.controlBtn svg{
width:40px;
height:40px;
fill:white;
pointer-events:none;
}

</style>

</head>

<body>

<div id="controls">

<div class="controlBtn" id="left">
<svg viewBox="0 0 24 24">
<polygon points="15,4 5,12 15,20"></polygon>
</svg>
</div>

<div class="controlBtn" id="jump">
<svg viewBox="0 0 24 24">
<polygon points="12,4 4,16 20,16"></polygon>
</svg>
</div>

<div class="controlBtn" id="right">
<svg viewBox="0 0 24 24">
<polygon points="9,4 19,12 9,20"></polygon>
</svg>
</div>

</div>

<script src="main.js"></script>

</body>

</html>
